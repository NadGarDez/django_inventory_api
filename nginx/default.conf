upstream django_app {
    server web:8000;
}

server {
    listen 80;

    # Archivos estáticos
    location /static/ {
        alias /app/staticfiles/;
    }

    # Archivos media (fotos de productos)
    location /media/ {
        alias /app/media/;
    }

    # Peticiones a la API
    location / {
        proxy_pass http://django_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }
}